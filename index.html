        </div>

        {!match.home || !match.away ? (
          <div className="empty"><div className="icon">🏆</div><div className="text">This fixture is not ready yet.</div></div>
        ) : !r ? (
          <div className="empty"><div className="icon">🏏</div><div className="text">No scorecard has been added for this fixture yet.</div></div>
        ) : (
          <FullScorecard result={r} />
        )}

        <div className="scorecard-actions">
          <button className="btn" onClick={onClose}>Close Scoreboard</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// MATCH EDITOR — full scorecard model
// ============================================================================

const emptyBat = () => ({ name: '', runs: '', balls: '', fours: '', sixes: '', dismissal: '', notOut: false });
const emptyBowl = () => ({ name: '', overs: '', maidens: '', runs: '', wickets: '' });

function freshInnings(team) {
  return {
    team,
    runs: '', wkts: '', overs: '', extras: '', allOut: false,
    bat: [emptyBat(), emptyBat()],
    bowl: [emptyBowl(), emptyBowl()]
  };
}

// Convert an old-model result to the new innings model
function upgradeResult(match, oldR) {
  if (!oldR) return null;
  if (Array.isArray(oldR.innings)) return oldR;
  const homeInn = freshInnings(match.home);
  const awayInn = freshInnings(match.away);
  homeInn.runs = oldR.homeRuns || ''; homeInn.wkts = oldR.homeWickets || '';
  homeInn.overs = oldR.homeOvers || ''; homeInn.allOut = !!oldR.homeAllOut;
  awayInn.runs = oldR.awayRuns || ''; awayInn.wkts = oldR.awayWickets || '';
  awayInn.overs = oldR.awayOvers || ''; awayInn.allOut = !!oldR.awayAllOut;
  (oldR.topBatters || []).forEach(b => {
    const inn = b.team === match.away ? awayInn : homeInn;
    inn.bat.push({ name: b.name||'', runs: b.runs||'', balls: b.balls||'',
                   fours: b.fours||'', sixes: b.sixes||'', dismissal: '', notOut: false });
  });
  (oldR.topBowlers || []).forEach(b => {
    const inn = b.team === match.away ? awayInn : homeInn;
    inn.bowl.push({ name: b.name||'', overs: b.overs||'', maidens: '',
                    runs: b.runs||'', wickets: b.wickets||'' });
  });
  return {
    date: oldR.date || new Date().toISOString().slice(0,10),
    winner: oldR.winner || '', margin: oldR.margin || '', noResult: !!oldR.noResult,
    notes: oldR.notes || '',
    innings: [homeInn, awayInn]
  };
}

function MatchEditor({ match, teams, onSave, onClear, onUpdateVenue, onClose }) {
  const init = match.result
    ? upgradeResult(match, match.result)
    : {
        date: new Date().toISOString().slice(0,10),
        winner: '', margin: '', noResult: false, notes: '',
        innings: [freshInnings(match.home), freshInnings(match.away)]
      };

  const [r, setR] = useState(init);
  const [section, setSection] = useState('paste');
  const [pasteText, setPasteText] = useState('');
  const [pasteMsg, setPasteMsg] = useState(null);

  const homeTeam = teams.find(t => t.name === match.home);
  const awayTeam = teams.find(t => t.name === match.away);

  function setField(key, val) { setR(prev => ({ ...prev, [key]: val })); }

  function setInnField(idx, key, val) {
    setR(prev => ({
      ...prev,
      innings: prev.innings.map((inn,i) => i===idx ? { ...inn, [key]: val } : inn)
    }));
  }
  function setBatRow(idx, rowIdx, key, val) {
    setR(prev => ({
      ...prev,
      innings: prev.innings.map((inn,i) => i!==idx ? inn : {
        ...inn, bat: inn.bat.map((b,j) => j===rowIdx ? { ...b, [key]: val } : b)
      })
    }));
  }
  function setBowlRow(idx, rowIdx, key, val) {
    setR(prev => ({
      ...prev,
      innings: prev.innings.map((inn,i) => i!==idx ? inn : {
        ...inn, bowl: inn.bowl.map((b,j) => j===rowIdx ? { ...b, [key]: val } : b)
      })
    }));
  }
  function addBatRow(idx) {
    setR(prev => ({ ...prev, innings: prev.innings.map((inn,i) =>
      i===idx ? { ...inn, bat: [...inn.bat, emptyBat()] } : inn) }));
  }
  function addBowlRow(idx) {
    setR(prev => ({ ...prev, innings: prev.innings.map((inn,i) =>
      i===idx ? { ...inn, bowl: [...inn.bowl, emptyBowl()] } : inn) }));
  }
  function removeBatRow(idx, rowIdx) {
    setR(prev => ({ ...prev, innings: prev.innings.map((inn,i) =>
      i===idx ? { ...inn, bat: inn.bat.filter((_,j) => j!==rowIdx) } : inn) }));
  }
  function removeBowlRow(idx, rowIdx) {
    setR(prev => ({ ...prev, innings: prev.innings.map((inn,i) =>
      i===idx ? { ...inn, bowl: inn.bowl.filter((_,j) => j!==rowIdx) } : inn) }));
  }

  function quickWin(winner) {
    setR(prev => ({ ...prev, winner, noResult: false }));
  }
  function toggleNoResult() {
    setR(prev => ({ ...prev, noResult: !prev.noResult, winner: '' }));
  }

  function parsePasteBlock(text) {
    const result = JSON.parse(JSON.stringify(r));
    const warnings = [];
    let touched = { meta:false, innings:0, bat:0, bowl:0 };

    const teamMatch = (raw) => {
      const t = (raw||'').trim().toLowerCase();
      if (!t) return null;
      if (match.home && match.home.toLowerCase() === t) return match.home;
      if (match.away && match.away.toLowerCase() === t) return match.away;
      if (match.home && (match.home.toLowerCase().includes(t) || t.includes(match.home.toLowerCase()))) return match.home;
      if (match.away && (match.away.toLowerCase().includes(t) || t.includes(match.away.toLowerCase()))) return match.away;
      return null;
    };
    const innIndexFor = (team) => team === match.away ? 1 : 0;

    let workInnings = [freshInnings(match.home), freshInnings(match.away)];
    workInnings[0].bat = []; workInnings[0].bowl = [];
    workInnings[1].bat = []; workInnings[1].bowl = [];
    let currentInn = null;

    const lines = text.split(/\r?\n/);
    for (let raw of lines) {
      const line = raw.trim();
      if (!line) continue;
      const colon = line.indexOf(':');
      if (colon === -1) continue;
      const key = line.slice(0, colon).trim().toUpperCase();
      const val = line.slice(colon + 1).trim();

      if (key === 'DATE') { result.date = val; touched.meta = true; }
      else if (key === 'WINNER') {
        if (/no\s*result/i.test(val)) { result.noResult = true; result.winner = ''; }
        else {
          const tm = teamMatch(val);
          if (tm) { result.winner = tm; result.noResult = false; }
          else warnings.push('Winner "' + val + '" did not match a team');
        }
        touched.meta = true;
      }
      else if (key === 'MARGIN') { result.margin = val; touched.meta = true; }
      else if (key === 'NOTES') { result.notes = val; touched.meta = true; }
      else if (key === 'INNINGS') {
        const m = val.match(/^(.*?)\s+(\d+)\s*\/\s*(\d+)\s*\(([\d.]+)\)/);
        if (m) {
          const tm = teamMatch(m[1]);
          if (tm) {
            const idx = innIndexFor(tm);
            currentInn = idx;
            workInnings[idx].team = tm;
            workInnings[idx].runs = m[2];
            workInnings[idx].wkts = m[3];
            workInnings[idx].overs = m[4];
            workInnings[idx].allOut = /allout|all out/i.test(val) || m[3] === '10';
            touched.innings++;
          } else warnings.push('Innings team "' + m[1] + '" did not match');
        } else warnings.push('Could not read innings line "' + val + '"');
      }
      else if (key === 'BAT') {
        if (currentInn === null) { warnings.push('BAT line before any INNINGS line'); continue; }
        const p = val.split(',').map(x => x.trim());
        const dismissal = p[5] || '';
        const notOut = /not\s*out|n\.?o\.?/i.test(dismissal);
        workInnings[currentInn].bat.push({
          name: p[0]||'', runs: p[1]||'', balls: p[2]||'',
          fours: p[3]||'', sixes: p[4]||'', dismissal, notOut
        });
        touched.bat++;
      }
      else if (key === 'BOWL') {
        if (currentInn === null) { warnings.push('BOWL line before any INNINGS line'); continue; }
        const p = val.split(',').map(x => x.trim());
        workInnings[currentInn].bowl.push({
          name: p[0]||'', overs: p[1]||'', maidens: p[2]||'',
          runs: p[3]||'', wickets: p[4]||''
        });
        touched.bowl++;
      }
    }

    if (touched.innings > 0 || touched.bat > 0 || touched.bowl > 0) {
      workInnings.forEach(inn => {
        if (inn.bat.length === 0) inn.bat = [emptyBat()];
        if (inn.bowl.length === 0) inn.bowl = [emptyBowl()];
      });
      result.innings = workInnings;
    }
    return { result, warnings, touched };
  }

  function applyPaste() {
    if (!pasteText.trim()) {
      setPasteMsg({ type:'error', text:'Paste a match data block first.' });
      return;
    }
    try {
      const out = parsePasteBlock(pasteText);
      setR(out.result);
      const bits = [];
      if (out.touched.innings) bits.push(out.touched.innings + ' innings');
      if (out.touched.bat) bits.push(out.touched.bat + ' batters');
      if (out.touched.bowl) bits.push(out.touched.bowl + ' bowlers');
      if (out.result.winner) bits.push('winner');
      const summary = bits.length ? ('Filled ' + bits.join(', ') + '.') : 'Nothing recognised - check the format.';
      setPasteMsg({
        type: out.warnings.length ? 'warn' : 'ok',
        text: summary + (out.warnings.length
          ? ' WARNING: ' + out.warnings.join('; ')
          : ' Review on the card tabs, then save.')
      });
    } catch (e) {
      setPasteMsg({ type:'error', text:'Parse failed: ' + e.message });
    }
  }

  function handleSave() {
    if (!r.noResult) {
      if (!r.winner) { alert('Pick a winner, or mark the match No Result.'); return; }
      const h = r.innings[0], a = r.innings[1];
      if (h.runs === '' || a.runs === '') {
        alert('Enter both teams\u2019 totals on the Result tab.'); return;
      }
    }
    onSave(r);
  }

  const playable = match.home && match.away;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>&#10005;</button>
        <h2>{match.id} &middot; {match.home || 'TBD'} <span style={{color:'var(--dim)'}}>v</span> {match.away || 'TBD'}</h2>

        {!playable && (
          <div style={{padding:16, background:'var(--bg-3)', borderRadius:10,
                       color:'var(--muted)', fontSize:13}}>
            This {match.label} will be assigned once the prerequisite matches finish.
          </div>
        )}

        {playable && (
          <>
            <div className="nav" style={{marginBottom:20, display:'flex'}}>
              <button className={section==='paste'?'active':''} onClick={()=>setSection('paste')}>Paste</button>
              <button className={section==='result'?'active':''} onClick={()=>setSection('result')}>Result</button>
              <button className={section==='home'?'active':''} onClick={()=>setSection('home')}>{(TEAM_SHORT[match.home]||'Home')} Card</button>
              <button className={section==='away'?'active':''} onClick={()=>setSection('away')}>{(TEAM_SHORT[match.away]||'Away')} Card</button>
              <button className={section==='review'?'active':''} onClick={()=>setSection('review')}>Scorecard</button>
            </div>

            {section === 'paste' && (
              <PasteSection
                match={match} pasteText={pasteText} setPasteText={setPasteText}
                pasteMsg={pasteMsg} setPasteMsg={setPasteMsg} applyPaste={applyPaste} />
            )}

            {section === 'result' && (
              <ResultSection
                r={r} match={match} setField={setField}
                setInnField={setInnField} quickWin={quickWin} toggleNoResult={toggleNoResult}
                onUpdateVenue={onUpdateVenue} />
            )}

            {section === 'home' && (
              <InningsEditor
                idx={0} inn={r.innings[0]} roster={homeTeam}
                setBatRow={setBatRow} setBowlRow={setBowlRow}
                addBatRow={addBatRow} addBowlRow={addBowlRow}
                removeBatRow={removeBatRow} removeBowlRow={removeBowlRow} />
            )}
            {section === 'away' && (
              <InningsEditor
                idx={1} inn={r.innings[1]} roster={awayTeam}
                setBatRow={setBatRow} setBowlRow={setBowlRow}
                addBatRow={addBatRow} addBowlRow={addBowlRow}
                removeBatRow={removeBatRow} removeBowlRow={removeBowlRow} />
            )}
            {section === 'review' && <FullScorecard result={r} />}

            <div className="btn-row" style={{marginTop:24, justifyContent:'space-between'}}>
              <button className="btn ghost" onClick={onClose}>Cancel</button>
              <div className="btn-row">
                {match.result && <button className="btn danger" onClick={onClear}>Clear Result</button>}
                <button className="btn" onClick={handleSave}>Save Match</button>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function PasteSection({ match, pasteText, setPasteText, pasteMsg, setPasteMsg, applyPaste }) {
  const sample =
    'DATE: 2026-05-20\n' +
    'WINNER: ' + (match.away||'Team B') + '\n' +
    'MARGIN: won by 9 wickets\n' +
    '\n' +
    'INNINGS: ' + (match.home||'Team A') + ' 31/10 (9.0)\n' +
    'BAT: Player One, 12, 4, 0, 2, c&b Bowler\n' +
    'BAT: Player Two, 1, 4, 0, 0, not out\n' +
    'BOWL: Bowler X, 3.0, 0, 5, 4\n' +
    '\n' +
    'INNINGS: ' + (match.away||'Team B') + ' 34/1 (3.3)\n' +
    'BAT: Player Three, 30, 13, 3, 3, not out\n' +
    'BOWL: Bowler Y, 2.0, 0, 16, 1\n' +
    'NOTES: chased down inside 4 overs';
  return (
    <div>
      <div style={{background:'var(--accent-soft)', border:'1px solid rgba(200,144,47,0.3)',
                   borderRadius:10, padding:14, marginBottom:16, fontSize:13,
                   color:'var(--muted)', lineHeight:1.6}}>
        Paste a full match block (you can get one from your Cricket 26 screenshots) and
        tap <strong style={{color:'var(--text)'}}>Fill Form</strong>. It builds the
        complete scorecard - both innings, every batter and bowler. Review on the card
        tabs, then save.
      </div>
      <div className="field">
        <label>Match Data Block</label>
        <textarea value={pasteText} rows="16" spellCheck="false"
          onChange={e => { setPasteText(e.target.value); setPasteMsg(null); }}
          placeholder={sample}
          style={{fontFamily:"'JetBrains Mono', monospace", fontSize:12, lineHeight:1.7}} />
      </div>
      {pasteMsg && (
        <div style={{padding:'10px 14px', borderRadius:8, marginBottom:14, fontSize:13,
          background: pasteMsg.type==='ok' ? 'var(--green-soft)'
                    : pasteMsg.type==='warn' ? 'var(--accent-soft)' : 'var(--red-soft)',
          border:'1px solid ' + (pasteMsg.type==='ok' ? 'rgba(26,157,92,0.3)'
                    : pasteMsg.type==='warn' ? 'rgba(200,144,47,0.3)' : 'rgba(216,58,58,0.3)'),
          color: pasteMsg.type==='ok' ? 'var(--green)'
               : pasteMsg.type==='warn' ? 'var(--accent-2)' : 'var(--red)'}}>
          {pasteMsg.text}
        </div>
      )}
      <div className="btn-row">
        <button className="btn" onClick={applyPaste}>Fill Form</button>
        <button className="btn ghost small" onClick={() => { setPasteText(''); setPasteMsg(null); }}>Clear</button>
      </div>
      <details style={{marginTop:20}}>
        <summary style={{cursor:'pointer', fontSize:12, color:'var(--muted)', fontWeight:600}}>
          Format reference
        </summary>
        <div style={{marginTop:10, fontSize:12, color:'var(--muted)', lineHeight:1.9,
                     background:'var(--bg-3)', borderRadius:8, padding:14}}>
          <strong style={{color:'var(--text)'}}>DATE:</strong> YYYY-MM-DD<br/>
          <strong style={{color:'var(--text)'}}>WINNER:</strong> team name, or NO RESULT<br/>
          <strong style={{color:'var(--text)'}}>MARGIN:</strong> free text<br/>
          <strong style={{color:'var(--text)'}}>NOTES:</strong> free text<br/>
          <strong style={{color:'var(--text)'}}>INNINGS:</strong> team runs/wkts (overs)<br/>
          <strong style={{color:'var(--text)'}}>BAT:</strong> name, runs, balls, 4s, 6s, dismissal<br/>
          <strong style={{color:'var(--text)'}}>BOWL:</strong> name, overs, maidens, runs, wickets<br/>
          BAT/BOWL attach to the most recent INNINGS line. Write "not out" in the
          dismissal field to mark a not-out batter.
        </div>
      </details>
    </div>
  );
}

function ResultSection({ r, match, setField, setInnField, quickWin, toggleNoResult, onUpdateVenue }) {
  return (
    <div>
      <div className="row">
        <div className="field">
          <label>Date Played</label>
          <input type="date" value={r.date} onChange={e=>setField('date', e.target.value)} />
        </div>
        <div className="field">
          <label>Venue</label>
          <input type="text" defaultValue={match.venue || ''}
                 onBlur={e => onUpdateVenue && onUpdateVenue(e.target.value)}
                 placeholder="Stadium" />
        </div>
      </div>

      <div className="field">
        <label>Winner - tap to select</label>
        <div className="row-3">
          <button className={'btn ' + (r.winner===match.home?'':'secondary')}
            onClick={()=>quickWin(match.home)}
            style={r.winner===match.home ? {background:TEAM_COLORS[match.home]} : {}}>
            {match.home}
          </button>
          <button className={'btn ' + (r.winner===match.away?'':'secondary')}
            onClick={()=>quickWin(match.away)}
            style={r.winner===match.away ? {background:TEAM_COLORS[match.away]} : {}}>
            {match.away}
          </button>
          <button className={'btn ' + (r.noResult?'danger':'ghost')}
            onClick={toggleNoResult}>
            {r.noResult ? 'No Result \u2713' : 'No Result'}
          </button>
        </div>
      </div>

      {!r.noResult && [0,1].map(idx => {
        const inn = r.innings[idx];
        return (
          <div key={idx}>
            <h3>{inn.team} - innings total</h3>
            <div className="row-4">
              <div className="field">
                <label>Runs</label>
                <input type="number" value={inn.runs}

              </div>
              <div className="field">
                <label>Wickets</label>
                <input type="number" min="0" max="10" value={inn.wkts}
                       onChange={e=>setInnField(idx,'wkts',e.target.value)} placeholder="6"/>
              </div>
              <div className="field">
                <label>Overs</label>
                <input type="text" value={inn.overs}
                       onChange={e=>setInnField(idx,'overs',e.target.value)} placeholder="20.0"/>
              </div>
              <div className="field">
                <label>All Out</label>
                <button className={'btn small ' + (inn.allOut?'':'secondary')}
                        onClick={()=>setInnField(idx,'allOut',!inn.allOut)}
                        style={{width:'100%'}}>
                  {inn.allOut ? 'Yes \u2713' : 'No'}
                </button>
              </div>
            </div>
          </div>
        );
      })}

      <div className="field" style={{marginTop:8}}>
        <label>Result Margin</label>
        <input type="text" value={r.margin}
               onChange={e=>setField('margin', e.target.value)}
               placeholder="e.g. won by 9 wickets" />
      </div>
      <div className="field">
        <label>Match Notes</label>
        <textarea value={r.notes} onChange={e=>setField('notes', e.target.value)}
                  placeholder="MOM, key moments, anything memorable..." rows="3" />
      </div>
    </div>
  );
}

function InningsEditor({ idx, inn, roster, setBatRow, setBowlRow,
                         addBatRow, addBowlRow, removeBatRow, removeBowlRow }) {
  const listId = 'roster-' + idx;
  return (
    <div>
      <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:6}}>
        <span className="team-dot" style={{background:TEAM_COLORS[inn.team], width:8, height:24}}></span>
        <span style={{fontFamily:"'Playfair Display', serif", fontWeight:800, fontSize:20}}>
          {inn.team}
        </span>
        <span style={{marginLeft:'auto', fontFamily:"'JetBrains Mono'", fontWeight:700, fontSize:16}}>
          {inn.runs || '\u2013'}/{inn.wkts || '0'}
          <span style={{color:'var(--muted)', fontSize:12, fontWeight:400, marginLeft:6}}>
            ({inn.overs || '\u2013'})
          </span>
        </span>
      </div>
      <div style={{fontSize:12, color:'var(--muted)', marginBottom:14}}>
        Innings totals are set on the Result tab. Add each batter and bowler below.
      </div>

      {roster && (
        <datalist id={listId}>
          {roster.players.map(p => <option key={p.name} value={p.name}>{p.role}</option>)}
        </datalist>
      )}

      <h3>Batting</h3>
      {inn.bat.map((b, j) => (
        <div key={j} style={{background:'var(--bg-3)', borderRadius:10, padding:12, marginBottom:8}}>
          <div className="field" style={{marginBottom:8}}>
            <label>Batter {j+1}</label>
            <input type="text" list={listId} value={b.name}
                   onChange={e=>setBatRow(idx,j,'name',e.target.value)}
                   placeholder="Player name" />
          </div>
          <div className="row-4">
            <div className="field" style={{marginBottom:8}}>
              <label>Runs</label>
              <input type="number" value={b.runs} onChange={e=>setBatRow(idx,j,'runs',e.target.value)} />
            </div>
            <div className="field" style={{marginBottom:8}}>
              <label>Balls</label>
              <input type="number" value={b.balls} onChange={e=>setBatRow(idx,j,'balls',e.target.value)} />
            </div>
            <div className="field" style={{marginBottom:8}}>
              <label>4s</label>
              <input type="number" value={b.fours} onChange={e=>setBatRow(idx,j,'fours',e.target.value)} />
            </div>
            <div className="field" style={{marginBottom:8}}>
              <label>6s</label>
              <input type="number" value={b.sixes} onChange={e=>setBatRow(idx,j,'sixes',e.target.value)} />
            </div>
          </div>
          <div style={{display:'flex', gap:10, alignItems:'flex-end'}}>
            <div className="field" style={{marginBottom:0, flex:1}}>
              <label>Dismissal (blank if not out)</label>
              <input type="text" value={b.dismissal}
                     onChange={e=>setBatRow(idx,j,'dismissal',e.target.value)}
                     placeholder="c & b Bowler / lbw / run out" />
            </div>
            <button className={'btn small ' + (b.notOut?'':'secondary')}
                    onClick={()=>setBatRow(idx,j,'notOut',!b.notOut)}>
              {b.notOut ? 'Not Out \u2713' : 'Not Out'}
            </button>
            <button className="btn danger small" onClick={()=>removeBatRow(idx,j)}>&#10005;</button>
          </div>
        </div>
      ))}
      <button className="btn ghost small" onClick={()=>addBatRow(idx)}>+ Add batter</button>

      <h3 style={{marginTop:22}}>Bowling (opposition bowlers in this innings)</h3>
      {inn.bowl.map((b, j) => (
        <div key={j} style={{background:'var(--bg-3)', borderRadius:10, padding:12, marginBottom:8}}>
          <div className="field" style={{marginBottom:8}}>
            <label>Bowler {j+1}</label>
            <input type="text" value={b.name}
                   onChange={e=>setBowlRow(idx,j,'name',e.target.value)}
                   placeholder="Player name" />
          </div>
          <div className="row-4">
            <div className="field" style={{marginBottom:0}}>
              <label>Overs</label>
              <input type="text" value={b.overs} onChange={e=>setBowlRow(idx,j,'overs',e.target.value)} placeholder="4.0"/>
            </div>
            <div className="field" style={{marginBottom:0}}>
              <label>Maidens</label>
              <input type="number" value={b.maidens} onChange={e=>setBowlRow(idx,j,'maidens',e.target.value)} />
            </div>
            <div className="field" style={{marginBottom:0}}>
              <label>Runs</label>
              <input type="number" value={b.runs} onChange={e=>setBowlRow(idx,j,'runs',e.target.value)} />
            </div>
            <div className="field" style={{marginBottom:0}}>
              <label>Wickets</label>
              <input type="number" value={b.wickets} onChange={e=>setBowlRow(idx,j,'wickets',e.target.value)} />
            </div>
          </div>
          <div style={{textAlign:'right', marginTop:8}}>
            <button className="btn danger small" onClick={()=>removeBowlRow(idx,j)}>Remove</button>
          </div>
        </div>
      ))}
      <button className="btn ghost small" onClick={()=>addBowlRow(idx)}>+ Add bowler</button>
    </div>
  );
}

function FullScorecard({ result }) {
  const [activeIdx, setActiveIdx] = useState(0);
  if (result.noResult) {
    return (<div className="empty"><div className="icon">☔</div>
      <div className="text">This match was a No Result.</div></div>);
  }
  const innings = Array.isArray(result.innings) ? result.innings : [];
  if (innings.length === 0) {
    return (<div className="empty"><div className="icon">🏏</div>
      <div className="text">No scorecard data yet.</div></div>);
  }
  const active = innings[Math.min(activeIdx, innings.length - 1)];
  return (
    <div className="game-score-wrap">
      <div className="score-tabs">
        {innings.map((inn, i) => (
          <button key={i} className={'score-tab ' + (i===activeIdx?'active':'')} onClick={()=>setActiveIdx(i)}>
            {TEAM_ICONS[inn.team] || '🏏'} {TEAM_SHORT[inn.team] || inn.team} Batting
          </button>
        ))}
        {innings.map((inn, i) => (
          <button key={'b'+i} className={'score-tab ' + (i+innings.length===activeIdx?'active':'')} onClick={()=>setActiveIdx(i+innings.length)}>
            🎯 {TEAM_SHORT[inn.team] || inn.team} Bowling
          </button>
        ))}
      </div>
      {activeIdx < innings.length
        ? <BattingGameBoard inn={active} result={result} />
        : <BowlingGameBoard inn={innings[activeIdx - innings.length]} />}
      {result.margin && (
        <div className="game-notes"><strong style={{color:'var(--text)'}}>Result: </strong>{result.winner ? result.winner + ' ' : ''}{result.margin}</div>
      )}
      {result.notes && (
        <div className="game-notes"><strong style={{color:'var(--text)'}}>Notes: </strong>{result.notes}</div>
      )}
    </div>
  );
}

function fallOfWicketsText(inn) {
  const bat = (inn.bat || []).filter(b => b.name);
  let total = 0, wk = 0;
  const out = [];
  bat.forEach(b => {
    total += parseInt(b.runs) || 0;
    if (!b.notOut && (b.dismissal || b.runs !== '' || b.balls !== '')) {
      wk += 1;
      out.push(`${wk}-${total}`);
    }
  });
  return out.length ? out : ['—'];
}
function extrasCells(inn) {
  const e = parseInt(inn.extras) || 0;
  return ['0B','0NB','0LB', e ? `${e}WD` : '0WD', `TOTAL ${e}`];
}
function paddedRows(rows, minRows=11) {
  const out = rows.slice();
  while (out.length < minRows) out.push(null);
  return out;
}

function BattingGameBoard({ inn, result }) {
  const bat = (inn.bat || []).filter(b => b.name || b.runs !== '' || b.balls !== '');
  const rows = paddedRows(bat, 11);
  const fow = fallOfWicketsText(inn);
  const extras = extrasCells(inn);
  return (
    <div className="game-board" style={{'--team-strip': TEAM_COLORS[inn.team] || 'var(--accent)'}}>
      <div className="game-board-top">
        <div className="game-board-title">{inn.team}</div>
        <div className="team-mini-logo">{TEAM_ICONS[inn.team] || '🏏'}</div>
      </div>
      <div className="game-board-sub">◉ Match Summary · Batting Scorecard</div>
      <div className="table-wrap">
        <table className="game-table">
          <thead>
            <tr>
              <th style={{width:'28%'}}>Batter</th>
              <th style={{width:'22%'}}>Dismissal / Fielder</th>
              <th style={{width:'22%'}}>Bowler</th>
              <th>Runs</th><th>Balls</th><th>4s</th><th>6s</th><th>SR</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((b, i) => {
              if (!b) return <tr key={i} className="blank"><td colSpan="8">&nbsp;</td></tr>;
              const runs = parseInt(b.runs)||0, balls = parseInt(b.balls)||0;
              const sr = balls > 0 ? ((runs/balls)*100).toFixed(1) : '—';
              const dis = b.notOut ? 'NOT OUT' : (b.dismissal || '');
              const bowler = dis.match(/b\.\s*([^,]+)/i)?.[1] || dis.match(/b\s+([^,]+)/i)?.[1] || '';
              return (
                <tr key={i} className={b.notOut || runs >= 30 ? 'highlight' : ''}>
                  <td>{b.name || '—'}</td>
                  <td>{dis}</td>
                  <td>{bowler}</td>
                  <td className="num">{b.runs || 0}</td>
                  <td className="num">({b.balls || 0})</td>
                  <td className="num">{b.fours || 0}</td>
                  <td className="num">{b.sixes || 0}</td>
                  <td className="num">{sr}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div className="game-footer-row">
          <div className="game-footer-cell label">Fall Of Wicket</div>
          {Array.from({length:9}).map((_,i)=><div key={i} className="game-footer-cell">{fow[i] || ''}</div>)}
        </div>
        <div className="game-footer-row">
          <div className="game-footer-cell label">Extras</div>
          {extras.map((x,i)=><div key={i} className="game-footer-cell">{x}</div>)}
          {Array.from({length:4}).map((_,i)=><div key={'e'+i} className="game-footer-cell"></div>)}
        </div>
        <div className="game-total-bar">
          <span className="overs">{inn.overs || '—'} Overs</span>
          <span className="total">{inn.wkts || 0}/{inn.runs || 0}</span>
        </div>
      </div>
    </div>
  );
}

function BowlingGameBoard({ inn }) {
  const bowl = (inn.bowl || []).filter(b => b.name || b.overs || b.runs || b.wickets);
  const rows = paddedRows(bowl, 10);
  const fow = fallOfWicketsText(inn);
  const extras = extrasCells(inn);
  return (
    <div className="game-board" style={{'--team-strip': TEAM_COLORS[inn.team] || 'var(--accent)'}}>
      <div className="game-board-top">
        <div className="game-board-title">{inn.team}</div>
        <div className="team-mini-logo">{TEAM_ICONS[inn.team] || '🏏'}</div>
      </div>
      <div className="game-board-sub">◉ Match Summary · Bowling Scorecard</div>
      <div className="table-wrap">
        <table className="game-table">
          <thead>
            <tr><th style={{width:'34%'}}>Bowler</th><th>Overs</th><th>Dot Balls</th><th>Runs</th><th>Wickets</th><th>Economy</th><th>Extras</th></tr>
          </thead>
          <tbody>
            {rows.map((b, i) => {
              if (!b) return <tr key={i} className="blank"><td colSpan="7">&nbsp;</td></tr>;
              const balls = oversToBalls(b.overs), runs = parseInt(b.runs)||0;
              const econ = balls > 0 ? (runs/(balls/6)).toFixed(2) : '—';
              const dots = Math.max(0, balls - Math.ceil(runs/4));
              return (
                <tr key={i} className={(parseInt(b.wickets)||0) >= 2 ? 'highlight' : ''}>
                  <td>{b.name || '—'}</td>
                  <td className="num">{b.overs || 0}</td>
                  <td className="num">{dots}</td>
                  <td className="num">{b.runs || 0}</td>
                  <td className="num">{b.wickets || 0}</td>
                  <td className="num">{econ}</td>
                  <td className="num">0</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div className="game-footer-row">
          <div className="game-footer-cell label">Fall Of Wicket</div>
          {Array.from({length:9}).map((_,i)=><div key={i} className="game-footer-cell">{fow[i] || ''}</div>)}
        </div>
        <div className="game-footer-row">
          <div className="game-footer-cell label">Extras</div>
          {extras.map((x,i)=><div key={i} className="game-footer-cell">{x}</div>)}
          {Array.from({length:4}).map((_,i)=><div key={'e'+i} className="game-footer-cell"></div>)}
        </div>
        <div className="game-total-bar">
          <span className="overs">{inn.overs || '—'} Overs</span>
          <span className="total">{inn.wkts || 0}/{inn.runs || 0}</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
