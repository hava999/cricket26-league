<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cricket 26 League Live Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Cricket 26 Super League — colourful stadium theme */
    --bg: #07111f;
    --bg-2: #10213a;
    --bg-3: #172b49;
    --bg-4: #20395f;
    --border: rgba(255,255,255,0.12);
    --border-2: rgba(255,255,255,0.22);
    --text: #f8fbff;
    --muted: #b7c4d7;
    --dim: #8090a8;
    --accent: #ffb000;
    --accent-2: #ffd05c;
    --accent-deep: #ff6b00;
    --accent-soft: rgba(255,176,0,0.16);
    --green: #31e08b;
    --green-soft: rgba(49,224,139,0.16);
    --red: #ff5b6e;
    --red-soft: rgba(255,91,110,0.16);
    --blue: #42a5ff;
    --blue-soft: rgba(66,165,255,0.16);
    --purple: #b56cff;
    --purple-soft: rgba(181,108,255,0.17);
    --shadow-sm: 0 8px 24px rgba(0,0,0,0.22);
    --shadow-md: 0 14px 36px rgba(0,0,0,0.30);
    --shadow-lg: 0 22px 70px rgba(0,0,0,0.46);

    --team-1: #ff6b35;
    --team-2: #3ea7ff;
    --team-3: #ffbf2e;
    --team-4: #ff4f9a;
  }  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(circle at 15% 5%, rgba(255,107,0,0.28), transparent 28%),
      radial-gradient(circle at 85% 0%, rgba(66,165,255,0.28), transparent 30%),
      radial-gradient(circle at 60% 85%, rgba(255,79,154,0.16), transparent 30%),
      linear-gradient(135deg, #07111f 0%, #0d2442 48%, #260d35 100%);
    background-attachment: fixed;
  }
  .app { max-width: 1400px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; border: 1px solid var(--border); margin-bottom: 32px;
    flex-wrap: wrap; gap: 20px; border-radius: 24px;
    background: linear-gradient(135deg, rgba(255,176,0,0.15), rgba(66,165,255,0.10) 45%, rgba(255,79,154,0.14));
    box-shadow: var(--shadow-md); backdrop-filter: blur(8px);
  }
  .brand { display: flex; align-items: center; gap: 16px; }
  .logo {
    width: 82px; height: 82px;
    background: #050b14;
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.12), 0 12px 34px rgba(255,176,0,0.20);
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .brand-text h1 {
    margin: 0; font-family: 'Playfair Display', serif; font-weight: 800;
    font-size: 34px; letter-spacing: -0.5px; line-height: 1; color: var(--text);
  }
  .brand-text .sub {
    color: var(--muted); font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; margin-top: 7px; font-weight: 700;
  }
  .nav {
    display: flex; gap: 2px; background: var(--bg-2); padding: 5px;
    border-radius: 12px; border: 1px solid var(--border); overflow-x: auto;
    box-shadow: var(--shadow-sm);
  }
  .nav button {
    background: transparent; color: var(--muted); border: none; padding: 9px 15px;
    border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 600;
    font-size: 11px; letter-spacing: 1px; transition: all 0.15s; white-space: nowrap;
    text-transform: uppercase;
  }
  .nav button:hover { color: var(--text); background: var(--bg-3); }
  .nav button.active {
    background: linear-gradient(135deg, var(--accent-deep), var(--accent)); color: #07111f;
  }
  .nav button.active:hover { background: var(--text); color: #fff; }

  /* Cards */
  .card {
    background: linear-gradient(145deg, rgba(16,33,58,0.94), rgba(23,43,73,0.82));
    border: 1px solid var(--border); border-radius: 20px;
    padding: 26px; margin-bottom: 20px;
    box-shadow: var(--shadow-sm); backdrop-filter: blur(10px);
  }
  .card h2 {
    margin: 0 0 22px; font-family: 'Playfair Display', serif; font-weight: 800;
    font-size: 26px; letter-spacing: -0.3px; color: var(--text);
    display: flex; align-items: center; gap: 12px;
  }
  .card h2::before {
    content: ''; width: 4px; height: 24px;
    background: var(--accent); border-radius: 2px;
  }
  .card h3 {
    margin: 22px 0 14px; font-family: 'Inter', sans-serif; font-weight: 700;
    font-size: 11px; letter-spacing: 2px; color: var(--accent-2);
    text-transform: uppercase;
  }

  /* Stats grid */
  .stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .stat-card {
    background: linear-gradient(135deg, rgba(255,176,0,0.18), rgba(66,165,255,0.14));
    border: 1px solid var(--border); border-radius: 18px;
    padding: 20px; position: relative; overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .stat-card:nth-child(2n) { background: linear-gradient(135deg, rgba(49,224,139,0.16), rgba(66,165,255,0.14)); }
  .stat-card:nth-child(3n) { background: linear-gradient(135deg, rgba(255,79,154,0.18), rgba(181,108,255,0.14)); }
  .stat-card::after { content:''; position:absolute; inset:auto -20px -30px auto; width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,0.08); }
  .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .stat-card .label {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 700; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-card .value {
    font-family: 'Playfair Display', serif; font-weight: 800; font-size: 36px;
    line-height: 1.05; color: var(--text); letter-spacing: -0.5px;
  }
  .stat-card .delta {
    font-size: 12px; color: var(--muted); margin-top: 8px; letter-spacing: 0.1px;
  }
  .stat-card.accent {
    background: linear-gradient(135deg, rgba(255,176,0,0.30), rgba(255,107,0,0.18));
    border-color: rgba(255,176,0,0.45);
  }
  .stat-card.accent .value { color: var(--accent-2); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 560px; }
  thead th {
    text-align: left; padding: 11px 10px; color: var(--muted);
    font-weight: 700; font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; border-bottom: 2px solid var(--border-2);
  }
  thead th.center { text-align: center; }
  thead th.right { text-align: right; }
  tbody td {
    padding: 13px 10px; border-bottom: 1px solid var(--border);
    vertical-align: middle; color: var(--text);
  }
  tbody td.center { text-align: center; }
  tbody td.right { text-align: right; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.06); }
  .num { font-family: 'JetBrains Mono'; font-variant-numeric: tabular-nums; }
  .pts { font-weight: 700; color: var(--accent-2); font-family: 'JetBrains Mono'; font-size: 15px; }
  .pos-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 7px; font-weight: 700;
    font-family: 'JetBrains Mono'; font-size: 12px;
    background: var(--bg-3); color: var(--muted);
  }
  .pos-badge.top2 {
    background: var(--accent); color: #fff;
  }
  .pos-badge.top4 { background: var(--green-soft); color: var(--green); }
  .team-cell { display: flex; align-items: center; gap: 11px; font-weight: 600; }
  .team-dot {
    width: 5px; height: 26px; border-radius: 3px; flex-shrink: 0;
  }
  .nrr-pos { color: var(--green); font-weight: 600; }
  .nrr-neg { color: var(--red); font-weight: 600; }
  .form-cell { display: inline-flex; gap: 4px; }
  .form-pill {
    width: 22px; height: 22px; border-radius: 5px; display: inline-flex;
    align-items: center; justify-content: center; font-size: 10px;
    font-weight: 700; font-family: 'JetBrains Mono';
  }
  .form-W { background: var(--green-soft); color: var(--green); }
  .form-L { background: var(--red-soft); color: var(--red); }
  .form-N { background: var(--bg-3); color: var(--dim); }

  /* Buttons */
  .btn {
    background: linear-gradient(135deg, var(--accent-deep), var(--accent)); 
    color: #07111f; border: none; padding: 11px 20px;
    border-radius: 9px; cursor: pointer; font-family: inherit;
    font-weight: 700; font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .btn:hover { filter: brightness(1.08); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn.secondary {
    background: var(--bg-2); color: var(--text); border: 1px solid var(--border-2);
    box-shadow: var(--shadow-sm);
  }
  .btn.secondary:hover { background: var(--bg-3); border-color: var(--border-2); }
  .btn.danger { background: var(--red); color: white; }
  .btn.danger:hover { background: #c02e2e; }
  .btn.small { padding: 7px 13px; font-size: 10px; }
  .btn.ghost {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    box-shadow: none;
  }
  .btn.ghost:hover { color: var(--text); border-color: var(--border-2); background: var(--bg-3); box-shadow: none; }
  .btn.restart-btn {
    color: var(--muted); border-color: var(--border-2); background: var(--bg-2);
  }
  .btn.restart-btn:hover {
    color: var(--red); border-color: var(--red);
    background: var(--red-soft);
  }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  /* Inputs */
  input, select, textarea {
    background: var(--bg-2); border: 1px solid var(--border-2); color: var(--text);
    padding: 10px 13px; border-radius: 8px; font-family: inherit; font-size: 14px;
    width: 100%;
  }
  input::placeholder, textarea::placeholder { color: var(--dim); }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,144,47,0.12);
  }
  textarea { resize: vertical; min-height: 70px; font-family: inherit; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
    margin-bottom: 6px;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  /* Match cards */
  .match-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .match-card {
    background: linear-gradient(145deg, rgba(16,33,58,0.96), rgba(32,57,95,0.78));
    border: 1px solid var(--border);
    border-radius: 18px; padding: 18px; cursor: pointer;
    transition: all 0.18s; position: relative; overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .match-card::after { content:''; position:absolute; inset:0; pointer-events:none; background:linear-gradient(90deg, rgba(255,176,0,0.12), transparent 35%, rgba(66,165,255,0.10)); opacity:.85; }
  .match-card > * { position: relative; z-index: 1; }
  .match-card:hover { border-color: var(--border-2); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .match-card.played::before {
    content: 'PLAYED'; position: absolute; top: 14px; right: 14px;
    font-size: 9px; font-weight: 800; letter-spacing: 1px;
    color: var(--green); background: var(--green-soft);
    padding: 4px 9px; border-radius: 5px;
  }
  .match-card.upcoming::before {
    content: 'UPCOMING'; position: absolute; top: 14px; right: 14px;
    font-size: 9px; font-weight: 800; letter-spacing: 1px;
    color: var(--accent-2); background: var(--accent-soft);
    padding: 4px 9px; border-radius: 5px;
  }
  .match-num {
    font-size: 10px; color: var(--dim); letter-spacing: 1.5px;
    text-transform: uppercase; font-weight: 700; margin-bottom: 10px;
  }
  .match-teams { display: flex; align-items: center; gap: 12px; margin: 14px 0; }
  .match-team-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 7px 0;
  }
  .match-team-name {
    display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px;
    color: var(--text);
  }
  .match-team-score {
    font-family: 'JetBrains Mono'; font-weight: 700; font-size: 14px;
    color: var(--text);
  }
  .match-team-row.winner .match-team-score { color: var(--accent-2); }
  .match-team-row.winner .match-team-name { color: var(--accent-2); font-weight: 700; }
  .match-vs {
    text-align: center; color: var(--dim); font-size: 9px;
    letter-spacing: 2px; font-weight: 800; margin: 2px 0;
  }
  .match-result {
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted); font-weight: 500;
  }
  .match-date {
    font-size: 11px; color: var(--dim); margin-top: 8px;
    font-family: 'JetBrains Mono';
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(20,23,31,0.45);
    z-index: 100; display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 20px; overflow-y: auto; backdrop-filter: blur(3px);
  }
  .modal {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px; max-width: 760px; width: 100%;
    padding: 30px; position: relative;
    box-shadow: var(--shadow-lg);
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--bg-3); border: 1px solid var(--border);
    color: var(--muted); width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { color: var(--text); background: var(--bg-4); }
  .modal h2 {
    margin: 0 0 22px; font-family: 'Playfair Display', serif; font-weight: 800;
    font-size: 25px; letter-spacing: -0.3px; color: var(--text);
    padding-right: 40px;
  }

  /* Filters */
  .filter-bar {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
    padding: 13px; background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: var(--shadow-sm);
  }
  .filter-bar select { width: auto; min-width: 160px; }
  .filter-bar .spacer { flex: 1; }

  /* Players table */
  .role-pill {
    display: inline-block; padding: 3px 8px; border-radius: 5px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .role-Batsman { background: var(--blue-soft); color: var(--blue); }
  .role-Bowler { background: var(--purple-soft); color: var(--purple); }
  .role-All-Rounder { background: var(--green-soft); color: var(--green); }
  .role-Wicket-Keeper { background: var(--accent-soft); color: var(--accent-2); }
  .flag-pill {
    display: inline-block; padding: 3px 8px; border-radius: 5px;
    font-size: 10px; font-weight: 600; background: var(--bg-3);
    color: var(--muted); border: 1px solid var(--border);
  }

  /* Stadium badge */
  .stadium-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--muted);
  }
  .stadium-badge::before { content: '📍'; font-style: normal; font-size: 11px; }

  /* Playoffs bracket */
  .bracket {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;
    align-items: center;
  }
  .bracket-col h3 {
    font-family: 'Playfair Display', serif; font-weight: 700;
    font-size: 16px; letter-spacing: 0; color: var(--accent-2);
    margin: 0 0 14px; text-align: center; text-transform: none;
  }
  .bracket-match {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer;
    transition: all 0.2s; box-shadow: var(--shadow-sm);
  }
  .bracket-match:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
  .bracket-team {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; font-size: 13px; color: var(--text);
  }
  .bracket-team.winner { color: var(--accent-2); font-weight: 700; }
  .bracket-label {
    font-size: 9px; color: var(--dim); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px; font-weight: 800;
  }
  .trophy-card {
    background: var(--accent-soft);
    border: 1px solid rgba(200,144,47,0.4); border-radius: 16px;
    padding: 32px; text-align: center; position: relative; overflow: hidden;
    box-shadow: var(--shadow-md);
  }
  .trophy-card .trophy { font-size: 56px; margin-bottom: 8px; position: relative; }
  .trophy-card .champ-name {
    font-family: 'Playfair Display', serif; font-weight: 800;
    font-size: 38px; letter-spacing: -0.5px; color: var(--accent-2); position: relative;
  }
  .trophy-card .champ-label {
    font-size: 10px; color: var(--muted); letter-spacing: 2px;
    text-transform: uppercase; font-weight: 800; margin-bottom: 10px; position: relative;
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 56px 20px; color: var(--muted);
  }
  .empty .icon { font-size: 44px; margin-bottom: 12px; opacity: 0.5; }
  .empty .text { font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); border: 1px solid var(--text);
    color: #fff; padding: 12px 22px; border-radius: 10px;
    font-size: 13px; font-weight: 600; z-index: 200;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translate(-50%, 20px); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }

  /* ── Dashboard ──────────────────────────────────────────── */
  .dash-grid {
    display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px;
    margin-bottom: 20px; align-items: start;
  }
  @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; } }

  .hero {
    background: linear-gradient(135deg, rgba(255,176,0,0.18), rgba(16,33,58,0.94) 48%, rgba(66,165,255,0.16));
    border: 1px solid var(--border);
    border-radius: 22px; padding: 26px; box-shadow: var(--shadow-sm);
    position: relative; overflow: hidden;
  }
  .hero-eyebrow {
    font-size: 10px; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent-2); margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .hero-eyebrow::before {
    content: ''; width: 16px; height: 2px; background: var(--accent); border-radius: 1px;
  }
  .hero-leader { display: flex; align-items: center; gap: 18px; margin-bottom: 22px; }
  .hero-crest {
    width: 64px; height: 64px; border-radius: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-weight: 800; font-size: 24px;
    color: #fff;
  }
  .hero-leader-name {
    font-family: 'Playfair Display', serif; font-weight: 800;
    font-size: 30px; line-height: 1.05; color: var(--text); letter-spacing: -0.5px;
  }
  .hero-leader-sub {
    font-size: 12px; color: var(--muted); margin-top: 5px; font-weight: 500;
  }
  .hero-metrics {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--border); border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .hero-metric { background: var(--bg-2); padding: 14px 12px; text-align: center; }
  .hero-metric .m-value {
    font-family: 'JetBrains Mono'; font-weight: 700; font-size: 22px;
    color: var(--text); line-height: 1;
  }
  .hero-metric .m-label {
    font-size: 9px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; font-weight: 700; margin-top: 6px;
  }

  /* Progress card */
  .progress-card {
    background: linear-gradient(135deg, rgba(49,224,139,0.14), rgba(16,33,58,0.94) 52%, rgba(255,79,154,0.14));
    border: 1px solid var(--border);
    border-radius: 22px; padding: 24px; box-shadow: var(--shadow-sm);
  }
  .progress-ring-wrap { display: flex; align-items: center; gap: 20px; }
  .progress-num {
    font-family: 'Playfair Display', serif; font-weight: 800;
    font-size: 40px; color: var(--text); line-height: 1;
  }

  .scorecard-innings {

  .game-table .num { font-family:'JetBrains Mono',monospace; }

  .game-table tr.blank td { height:32px; color:rgba(255,255,255,.22); }

  .match-vs{
    display:none!important;
  }
  .match-result,.stadium-badge,.match-date{
    color:#64748b!important;
    font-size:11px!important;
    margin-top:6px!important;
  }

  /* Standings table: reduce visual noise */
  table{
    min-width:520px!important;
    font-size:12px!important;
  }
  thead th{
    background:#f8fafc!important;
    color:#64748b!important;
  }
  tbody td{
    color:#0f172a!important;
  }
  .team-cell span:last-child{
    font-weight:800!important;
  }

  /* Scorecard modal: only detailed area, clean white */
  .modal-overlay{
    background:rgba(15,23,42,.55)!important;
    backdrop-filter:blur(6px)!important;
  }
  .modal,.viewer-scoreboard-modal{
    max-width:440px!important;
    background:#f8fafc!important;
    color:#0f172a!important;
    padding:14px 10px 88px!important;
  }
  .modal h2{
    color:#0f172a!important;
    font-size:17px!important;
    font-family:Inter,system-ui,sans-serif!important;
  }
  .modal-close{
    background:#0f172a!important;
    color:#fff!important;
    border:0!important;
  }
  .readonly-note{
    background:#ecfdf5!important;
    border:1px solid #bbf7d0!important;
    color:#166534!important;
    border-radius:14px!important;
    font-size:12px!important;
  }
  .scorecard-innings{
    background:#fff!important;
    border:1px solid #e2e8f0!important;
    border-radius:16px!important;
    box-shadow:none!important;
  }
  .scorecard-innings-head{
    background:#f8fafc!important;
    border-bottom:1px solid #e2e8f0!important;
  }
  .scorecard-innings-head .team,
  .scorecard-innings-head .total{
    color:#0f172a!important;
    font-size:15px!important;
  }
  .scorecard-section-label{
    color:#64748b!important;
  }
  .sc-table th{
    background:#f8fafc!important;
    color:#64748b!important;
  }
  .sc-table td{
    color:#0f172a!important;
    border-bottom:1px solid #e2e8f0!important;
  }
  .sc-table .dismissal{
    color:#64748b!important;
  }
  .scorecard-actions .btn{
    background:#0f172a!important;
    color:#fff!important;
    box-shadow:0 8px 22px rgba(15,23,42,.20)!important;
  }

  /* Empty states */
  .empty{
    background:#fff!important;
    border:1px solid #e2e8f0!important;
    color:#64748b!important;
    border-radius:16px!important;
  }
  .empty .text{color:#64748b!important;}
}

</style>

// Read a team's innings score from a result, supporting both models.
// Returns { runs, wkts, overs } as strings, or null if not found.
function scoreFor(result, teamName) {
  if (!result) return null;
  if (Array.isArray(result.innings)) {
    const inn = result.innings.find(i => i.team === teamName);
    if (inn) return { runs: inn.runs, wkts: inn.wkts, overs: inn.overs };
    return null;
  }
  // old model
  return null;
}
// Score by home/away slot (old model fallback)
function scoreBySlot(result, slot) {
  if (!result) return null;
  if (Array.isArray(result.innings)) {
    const inn = result.innings[slot === 'home' ? 0 : 1];
    return inn ? { runs: inn.runs, wkts: inn.wkts, overs: inn.overs } : null;
  }
  if (slot === 'home') return { runs: result.homeRuns, wkts: result.homeWickets, overs: result.homeOvers };
  return { runs: result.awayRuns, wkts: result.awayWickets, overs: result.awayOvers };
}
function fmtScore(s) {
  if (!s || s.runs == null || s.runs === '') return '–';
  return `${s.runs}/${s.wkts || 0}`;
}

const GITHUB_OWNER = 'hava999';
const GITHUB_REPO = 'cricket26-league';
const GITHUB_BRANCH = 'main';
const GITHUB_DATA_PATH = 'league-data.json';

function getGithubToken() {
  return localStorage.getItem('cricket26_github_token') || '';
}

function setGithubToken(token) {
  localStorage.setItem('cricket26_github_token', token.trim());
}

async function githubApi(path, options = {}) {
  const token = getGithubToken();
  if (!token) throw new Error('Missing GitHub token');
  const res = await fetch(`https://api.github.com${path}`, {
    ...options,
    headers: {
      'Accept': 'application/vnd.github+json',
      'Authorization': `Bearer ${token}`,
      'X-GitHub-Api-Version': '2022-11-28',
      ...(options.headers || {})
    }
  });
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch(e) { data = text; }
  if (!res.ok) {
    throw new Error((data && data.message) ? data.message : `GitHub ${res.status}`);
  }
  return data;
}

function toBase64Utf8(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

async function commitLeagueDataToGitHub(state) {
  const contentUrl = `/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_DATA_PATH}?ref=${GITHUB_BRANCH}`;
  let sha = null;
  try {
    const current = await githubApi(contentUrl);
    sha = current.sha;
  } catch (e) {
    if (!String(e.message).includes('Not Found')) throw e;
  }

  const payload = {
    message: `Update Cricket 26 league data ${new Date().toISOString()}`,
    content: toBase64Utf8(JSON.stringify(state, null, 2)),
    branch: GITHUB_BRANCH
  };
  if (sha) payload.sha = sha;

  return githubApi(`/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_DATA_PATH}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
}

async function autoPublishLeagueData(state, setSyncStatus, setToast) {
  try {
    if (!getGithubToken()) {
      setSyncStatus && setSyncStatus('GitHub token needed');
      return false;
    }
    setSyncStatus && setSyncStatus('Publishing to GitHub...');
    await commitLeagueDataToGitHub(state);
    setSyncStatus && setSyncStatus('Published to GitHub');
    setToast && setToast('Published live ✓');
    return true;
  } catch (err) {
    console.error('GitHub publish failed', err);
    setSyncStatus && setSyncStatus('GitHub publish failed');
    setToast && setToast('⚠ GitHub publish failed: ' + err.message);
    return false;
  }
}

// Team name migrations — old name -> current name. Applied on load so
// previously-saved leagues pick up renames without losing data.
const TEAM_NAME_MIGRATIONS = {
  'MM mithaiwala': 'Mighty Magician',
  'MM Mithaiwala': 'Mighty Magician'
};
function migrateTeamName(name) {
  return TEAM_NAME_MIGRATIONS[name] || name;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);

    // Migration: rename teams everywhere (teams list, matches, results)
    if (s && s.teams) {
      s.teams = s.teams.map(t => ({ ...t, name: migrateTeamName(t.name) }));
    }
    if (s && s.matches) {
      s.matches = s.matches.map(m => {
        const nm = { ...m };
        if (nm.home) nm.home = migrateTeamName(nm.home);
        if (nm.away) nm.away = migrateTeamName(nm.away);
        if (nm.result) {
          const r = { ...nm.result };
          if (r.winner) r.winner = migrateTeamName(r.winner);
          if (Array.isArray(r.topBatters))
            r.topBatters = r.topBatters.map(b => ({ ...b, team: migrateTeamName(b.team) }));
          if (Array.isArray(r.topBowlers))
            r.topBowlers = r.topBowlers.map(b => ({ ...b, team: migrateTeamName(b.team) }));
          nm.result = r;
        }
        return nm;
      });
    }

    // Migration: ensure teams have homeStadium
    if (s && s.teams) {
      s.teams = s.teams.map(t => ({
        ...t,
        homeStadium: t.homeStadium || DEFAULT_VENUES[t.name] || ''
      }));
    }
    // Migration: ensure matches have venue
    if (s && s.matches) {
      s.matches = s.matches.map(m => {
        if (m.venue) return m;
        if (m.stage === 'league' && m.home) {
          const team = s.teams.find(t => t.name === m.home);
          return { ...m, venue: team?.homeStadium || DEFAULT_VENUES[m.home] || '' };
        }
        return { ...m, venue: DEFAULT_PLAYOFF_VENUES[m.id] || '' };
      });
    }
    return s;
  } catch (e) { return null; }
}
function saveState(state) {

// ============================================================================
// FIXTURE GENERATION — Double round-robin via circle method (perfectly fair)
// ============================================================================

// Shuffle helper (Fisher-Yates)
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Circle method: with n teams (n even), generate n-1 rounds where each team
// plays exactly once per round. Fix team 0, rotate the rest clockwise.
// This is how the EPL, La Liga, and every other major round-robin schedules.
//
// For 4 teams (T0, T1, T2, T3):
//   Round 1: T0-T1, T3-T2
//   Round 2: T0-T2, T1-T3
//   Round 3: T0-T3, T2-T1
//
// Properties:
//   - Each team plays exactly once per round → perfectly even rest
//   - All n-1 distinct opponents covered before any repeat
//   - We then play a second leg with home/away flipped → double round-robin
function buildRoundRobinSchedule(teamNames) {
  const teams = shuffle(teamNames); // randomize seat assignments each generation
  const n = teams.length;
  const rounds = []; // each round = array of {home, away}

  // Circle method: T0 fixed, others rotate
  let arr = teams.slice();
  for (let r = 0; r < n - 1; r++) {
    const round = [];
    for (let i = 0; i < n / 2; i++) {
      const home = arr[i];
      const away = arr[n - 1 - i];
      // Alternate home/away each round to balance home advantage
      if (r % 2 === 0) round.push({ home, away });
      else round.push({ home: away, away: home });
    }
    rounds.push(round);
    // Rotate: fix arr[0], rotate the rest by one position
    const fixed = arr[0];
    const rest = arr.slice(1);
    rest.unshift(rest.pop());
    arr = [fixed, ...rest];
  }

  // Second leg: same matchups, home/away swapped
  const leg2 = rounds.map(round =>
    round.map(m => ({ home: m.away, away: m.home }))
  );

  // Optionally shuffle the order of the second leg's rounds for variety
  // (keeps fairness intact since each round is internally balanced)
  const shuffledLeg2 = shuffle(leg2);

  return [...rounds, ...shuffledLeg2];
}

// Flatten rounds into a sequential match list. Within each round, randomize
// which fixture appears first (both are concurrent in reality; we just pick
// an order for display).
function flattenRounds(rounds) {
  const flat = [];
  rounds.forEach((round, rIdx) => {
    const order = shuffle(round);
    order.forEach(m => {
      flat.push({ ...m, round: rIdx + 1 });
    });
  });
  return flat;
}

function generateFixtures(teamNames, teamsData) {
  const venueOf = (name) => {
    const t = teamsData.find(x => x.name === name);
    return t?.homeStadium || DEFAULT_VENUES[name] || '';
  };

  const rounds = buildRoundRobinSchedule(teamNames);
  const ordered = flattenRounds(rounds);

  const matches = ordered.map((m, idx) => ({
    id: `M${String(idx + 1).padStart(2, '0')}`,
    stage: 'league',
    round: m.round,
    home: m.home,
    away: m.away,
    venue: venueOf(m.home),
    result: null
  }));

  // Playoffs (filled in once league completes; placeholders for now)
  matches.push({ id: 'Q1', stage: 'qualifier1', home: null, away: null, result: null,
                 venue: DEFAULT_PLAYOFF_VENUES.Q1,
                 label: 'Qualifier 1', desc: '1st vs 2nd → winner to Final' });
  matches.push({ id: 'EL', stage: 'eliminator', home: null, away: null, result: null,
                 venue: DEFAULT_PLAYOFF_VENUES.EL,
                 label: 'Eliminator',  desc: '3rd vs 4th → loser eliminated' });
  matches.push({ id: 'Q2', stage: 'qualifier2', home: null, away: null, result: null,
                 venue: DEFAULT_PLAYOFF_VENUES.Q2,
                 label: 'Qualifier 2', desc: 'Q1 loser vs EL winner' });
  matches.push({ id: 'FI', stage: 'final',     home: null, away: null, result: null,
                 venue: DEFAULT_PLAYOFF_VENUES.FI,
                 label: 'Final',       desc: 'Q1 winner vs Q2 winner' });
  return matches;
}

// Convert overs (e.g. "19.4") to balls
function oversToBalls(overs) {
  if (overs == null || overs === '') return 0;
  const s = String(overs);
  if (s.includes('.')) {
    const [whole, dec] = s.split('.');
    return parseInt(whole || '0') * 6 + parseInt(dec || '0');
  }
  return parseInt(s) * 6;
}
function ballsToOvers(balls) {
  const whole = Math.floor(balls / 6);
  const rem = balls % 6;
  return `${whole}.${rem}`;
}
// NRR = (runs scored / overs faced) − (runs conceded / overs bowled)
// If a team is bowled out, use the full allotted overs (20).
function computeNRR(forRuns, forBalls, againstRuns, againstBalls) {
  if (forBalls === 0 || againstBalls === 0) return 0;
  const forRate = forRuns / (forBalls / 6);
  const againstRate = againstRuns / (againstBalls / 6);
  return forRate - againstRate;
}

function fmtNRR(n) {
  if (n === 0 || isNaN(n)) return '0.000';
  const s = n.toFixed(3);
  return n > 0 ? `+${s}` : s;
}

function computeStandings(state) {
  const stats = {};
  state.teams.forEach(t => {
    stats[t.name] = {
      name: t.name, owner: t.owner || '', P: 0, W: 0, L: 0, NR: 0, Pts: 0,
      forRuns: 0, forBalls: 0, againstRuns: 0, againstBalls: 0,
      form: []
    };
  });

  // Only league matches contribute to standings
  state.matches
    .filter(m => m.stage === 'league' && m.result)
    .forEach(m => {
      const r = m.result;
      const h = stats[m.home], a = stats[m.away];
      h.P++; a.P++;

      // Read each side's innings from either the new or old result model.
      const readSlot = (slot, teamName) => {
        if (Array.isArray(r.innings)) {
          const inn = r.innings.find(i => i.team === teamName)
                    || r.innings[slot === 'home' ? 0 : 1];
          return inn
            ? { runs: parseInt(inn.runs)||0, overs: inn.overs, allOut: !!inn.allOut }
            : { runs: 0, overs: '', allOut: false };
        }
        return slot === 'home'
          ? { runs: parseInt(r.homeRuns)||0, overs: r.homeOvers, allOut: !!r.homeAllOut }
          : { runs: parseInt(r.awayRuns)||0, overs: r.awayOvers, allOut: !!r.awayAllOut };
      };
      const hS = readSlot('home', m.home);
      const aS = readSlot('away', m.away);

      // For NRR: a side's "for" = its own innings; "against" = opponent's
      const homeBalls = hS.allOut ? 120 : oversToBalls(hS.overs);
      const awayBalls = aS.allOut ? 120 : oversToBalls(aS.overs);
      h.forRuns += hS.runs; h.forBalls += homeBalls;
      h.againstRuns += aS.runs; h.againstBalls += awayBalls;
      a.forRuns += aS.runs; a.forBalls += awayBalls;
      a.againstRuns += hS.runs; a.againstBalls += homeBalls;

      if (r.noResult) {
        h.NR++; a.NR++; h.Pts++; a.Pts++;
        h.form.push('N'); a.form.push('N');
      } else if (r.winner === m.home) {
        h.W++; a.L++; h.Pts += 2;
        h.form.push('W'); a.form.push('L');
      } else if (r.winner === m.away) {
        a.W++; h.L++; a.Pts += 2;
        a.form.push('W'); h.form.push('L');
      }
    });

  const standings = Object.values(stats).map(s => ({
    ...s,
    NRR: computeNRR(s.forRuns, s.forBalls, s.againstRuns, s.againstBalls)
  }));

  // Sort: Points desc, then NRR desc, then wins desc
  standings.sort((a,b) => b.Pts - a.Pts || b.NRR - a.NRR || b.W - a.W);
  return standings;
}

// Collect every batting line across the match from the result object.
// New model: result.innings = [{ team, bat:[...], bowl:[...], runs, wkts, overs, extras }]
// Old model: result.topBatters / result.topBowlers — still supported.
function collectBattingLines(r) {
  if (Array.isArray(r.innings)) {
    const out = [];
    r.innings.forEach(inn => (inn.bat || []).forEach(b => out.push({ ...b, team: inn.team })));
    return out;
  }
  return r.topBatters || [];
}
function collectBowlingLines(r) {
  if (Array.isArray(r.innings)) {
    const out = [];
    r.innings.forEach(inn => (inn.bowl || []).forEach(b => out.push({ ...b, team: inn.team })));
    return out;
  }
  return r.topBowlers || [];
}

function computePlayerStats(state) {
  const bat = {}, bowl = {};
  state.matches.filter(m => m.result).forEach(m => {
    const r = m.result;
    collectBattingLines(r).forEach(b => {
      if (!b.name) return;
      const runs = parseInt(b.runs) || 0;
      const balls = parseInt(b.balls) || 0;
      // skip rows that are entirely empty (no name-only padding rows)
      if (b.runs === '' && b.balls === '' && !b.dismissal) return;
      if (!bat[b.name]) bat[b.name] = { name: b.name, team: b.team, runs: 0, balls: 0, fours: 0, sixes: 0, innings: 0, fifties: 0, hundreds: 0, notouts: 0, hs: 0 };
      bat[b.name].runs += runs;
      bat[b.name].balls += balls;
      bat[b.name].fours += parseInt(b.fours) || 0;
      bat[b.name].sixes += parseInt(b.sixes) || 0;
      bat[b.name].innings++;
      if (b.notOut) bat[b.name].notouts++;
      if (runs > bat[b.name].hs) bat[b.name].hs = runs;
      if (runs >= 100) bat[b.name].hundreds++;
      else if (runs >= 50) bat[b.name].fifties++;
    });
    collectBowlingLines(r).forEach(b => {
      if (!b.name) return;
      const balls = oversToBalls(b.overs);
      if (!b.wickets && !b.overs && !b.runs) return;
      if (!bowl[b.name]) bowl[b.name] = { name: b.name, team: b.team, wickets: 0, runs: 0, balls: 0, innings: 0, maidens: 0, best: 0 };
      const w = parseInt(b.wickets) || 0;
      bowl[b.name].wickets += w;
      bowl[b.name].runs += parseInt(b.runs) || 0;
      bowl[b.name].balls += balls;
      bowl[b.name].maidens += parseInt(b.maidens) || 0;
      bowl[b.name].innings++;
      if (w > bowl[b.name].best) bowl[b.name].best = w;
    });
  });

  const batters = Object.values(bat).map(b => ({
    ...b,
    SR: b.balls > 0 ? ((b.runs / b.balls) * 100).toFixed(2) : '0.00'
  })).sort((a,b) => b.runs - a.runs);

  const bowlers = Object.values(bowl).map(b => ({
    ...b,
    economy: b.balls > 0 ? (b.runs / (b.balls / 6)).toFixed(2) : '0.00',
    overs: ballsToOvers(b.balls)
  })).sort((a,b) => b.wickets - a.wickets || a.runs - b.runs);

  return { batters, bowlers };
}

function computePlayoffSeeds(state) {
  const standings = computeStandings(state);
  const leagueDone = standings.every(s => s.P === 6); // each team plays 6 league matches in 4-team double RR
  if (!leagueDone) return null;
  return {
    first: standings[0].name,
    second: standings[1].name,
    third: standings[2].name,
    fourth: standings[3].name
  };
}

function useToast() {
  const [msg, setMsg] = useState(null);
  useEffect(() => {
    if (!msg) return;
    const t = setTimeout(() => setMsg(null), 2200);
    return () => clearTimeout(t);
  }, [msg]);
  return [msg, setMsg];
}

// ============================================================================
// MAIN APP
// ============================================================================
function App() {
  const [state, setState] = useState(() => loadState() || defaultState());
  const [liveStatus, setLiveStatus] = useState('Loading live data...');
  const [view, setView] = useState('dashboard'); // dashboard | fixtures | standings | players | playoffs | teams | data
  const [editingMatch, setEditingMatch] = useState(null);
  const [showResetModal, setShowResetModal] = useState(false);
  const [toast, setToast] = useToast();
  const [githubDataStatus, setGithubDataStatus] = useState('Loading GitHub data...');
  // Public viewer: load shared league-data.json from GitHub Pages.
  useEffect(() => {
    let alive = true;
    async function refreshPublicData() {
      const data = await loadPublicLeagueData();
      if (!alive) return;
      if (data) {
        setState(data);
        setLiveStatus('Live scores updated');
      } else {
        setLiveStatus('Using embedded fallback');
      }
    }
    refreshPublicData();
    const timer = setInterval(refreshPublicData, 15000);
    return () => { alive = false; clearInterval(timer); };
  }, []);


  function updateMatch(matchId, result) { setToast('Viewer is read-only'); }

  function clearMatch(matchId) { setToast('Viewer is read-only'); }

  function updateTeamStadium(teamName, newStadium) {
    setState(s => ({
      ...s,
      teams: s.teams.map(t => t.name === teamName ? { ...t, homeStadium: newStadium } : t),
      // Re-sync league match venues that use this team as home
      // (but DON'T overwrite explicitly-set match venues — only league stage)
      matches: s.matches.map(m => {
        if (m.stage === 'league' && m.home === teamName) {
          return { ...m, venue: newStadium };
        }
        return m;
      })
    }));
    setToast('Stadium updated');
  }

  function updateMatchVenue(matchId, newVenue) {
    setState(s => ({
      ...s,
      matches: s.matches.map(m => m.id === matchId ? { ...m, venue: newVenue } : m)
    }));
  }

  function setPlayoffTeams(matchId, home, away) {
    setState(s => ({
      ...s,
      matches: s.matches.map(m => m.id === matchId ? { ...m, home, away } : m)
    }));
  }

  function resetAll() {
    setShowResetModal(true);
  }

  function confirmReset() {
    const fresh = defaultState();
    setState(fresh);
    setShowResetModal(false);
    setToast('League reset to start of season');
  }

  function publishNow() {
    autoPublishLeagueData(state, setGithubDataStatus, setToast);
  }

  function saveTokenAndPublish() {
    setGithubToken(githubTokenDraft);
    setToast('GitHub token saved locally');
    setTimeout(() => autoPublishLeagueData(state, setGithubDataStatus, setToast), 50);
  }

  function exportJSON() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `league-backup-${Date.now()}.json`; a.click();
    URL.revokeObjectURL(url);
    setToast('Backup downloaded');
  }

  function importJSON(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.teams || !data.matches) throw new Error('Invalid backup');
        setState(data);
        setToast('Backup restored ✓');
      } catch (err) { alert('Import failed: ' + err.message); }
    };
    reader.readAsText(file);
  }

  function exportCSV() {
    const rows = [['Match','Stage','Home','Away','Home Score','Away Score','Winner','Margin','Date','Notes']];
    state.matches.filter(m => m.result).forEach(m => {
      const r = m.result;
      const hs = scoreFor(r, m.home) || scoreBySlot(r, 'home');
      const as = scoreFor(r, m.away) || scoreBySlot(r, 'away');
      rows.push([
        m.id,
        m.stage,
        m.home,
        m.away,
        hs ? `${hs.runs||''}/${hs.wkts||0} (${hs.overs||''})` : '',
        as ? `${as.runs||''}/${as.wkts||0} (${as.overs||''})` : '',
        r.winner || (r.noResult ? 'No Result' : ''),
        r.margin || '',
        r.date || '',
        (r.notes || '').replace(/[\n,]/g, ' ')
      ]);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `league-results-${Date.now()}.csv`; a.click();
    URL.revokeObjectURL(url);
    setToast('CSV exported');
  }

  // Auto-seed playoffs once league completes
  useEffect(() => {
    const seeds = computePlayoffSeeds(state);
    if (!seeds) return;
    const q1 = state.matches.find(m => m.id === 'Q1');
    const el = state.matches.find(m => m.id === 'EL');
    if (q1 && (!q1.home || !q1.away)) {
      setPlayoffTeams('Q1', seeds.first, seeds.second);
      setPlayoffTeams('EL', seeds.third, seeds.fourth);
    }
    // Q2: Q1 loser + EL winner
    if (q1 && q1.result && el && el.result) {
      const q2 = state.matches.find(m => m.id === 'Q2');
      const q1Loser = q1.result.winner === q1.home ? q1.away : q1.home;
      const elWinner = el.result.winner;
      if (q2 && (q2.home !== q1Loser || q2.away !== elWinner)) {
        setPlayoffTeams('Q2', q1Loser, elWinner);
      }
    }
    // Final: Q1 winner + Q2 winner
    if (q1 && q1.result) {
      const q2 = state.matches.find(m => m.id === 'Q2');
      const fi = state.matches.find(m => m.id === 'FI');
      if (q2 && q2.result && fi) {
        const q1Winner = q1.result.winner;
        const q2Winner = q2.result.winner;
        if (fi.home !== q1Winner || fi.away !== q2Winner) {
          setPlayoffTeams('FI', q1Winner, q2Winner);
        }
      }
    }
  }, [state.matches]);

  return (
    <div className="app">
      <header className="header">
        <div className="brand">
          <div className="logo"><img src={LEAGUE_LOGO_SRC} alt="Cricket 26 Super League logo" /></div>
          <div className="brand-text"><div className="github-mode-badge admin">👀 VIEWER MODE · Live GitHub data</div>
            <h1>Cricket 26 Super League</h1>
            <div className="sub">Colour League Tracker · Season 2026</div>
          </div>
        </div>
        <div style={{display:'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap'}}>
          <span className="sync-chip warn">📄 {githubDataStatus}</span>
          <span className="sync-chip warn">📄 {liveStatus}</span>
          <nav className="nav">
            <button className={view==='dashboard'?'active':''} onClick={()=>setView('dashboard')}>Dashboard</button>
            <button className={view==='fixtures'?'active':''} onClick={()=>setView('fixtures')}>Fixtures</button>
            <button className={view==='standings'?'active':''} onClick={()=>setView('standings')}>Standings</button>
            <button className={view==='players'?'active':''} onClick={()=>setView('players')}>Players</button>
            <button className={view==='playoffs'?'active':''} onClick={()=>setView('playoffs')}>Playoffs</button>
            <button className={view==='teams'?'active':''} onClick={()=>setView('teams')}>Teams</button>
            
          </nav>
          <button className="btn ghost small restart-btn" onClick={resetAll} title="Reset the entire league">
            ⟲ Restart
          </button>
        </div>
      </header>
      {view === 'dashboard' && <Dashboard state={state} onOpenMatch={setEditingMatch} />}
      {view === 'fixtures' && <Fixtures state={state} onOpenMatch={setEditingMatch} />}
      {view === 'standings' && <Standings state={state} />}
      {view === 'players' && <Players state={state} />}
      {view === 'playoffs' && <Playoffs state={state} onOpenMatch={setEditingMatch} />}
      {view === 'teams' && <Squads state={state} onUpdateStadium={updateTeamStadium} />}
      

      {editingMatch && (
        <ScorecardViewer
          match={editingMatch}
          onClose={() => setEditingMatch(null)}
        />
      )}

      {showResetModal && (
        <ResetModal
          state={state}
          onConfirm={confirmReset}
          onClose={() => setShowResetModal(false)}
          onBackupFirst={exportJSON}
        />
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// DASHBOARD

function Dashboard({ state, onOpenMatch }) {
  const standings = useMemo(() => computeStandings(state), [state]);
  const { batters, bowlers } = useMemo(() => computePlayerStats(state), [state]);
  const totalMatches = state.matches.filter(m => m.stage === 'league').length;
  const playedMatches = state.matches.filter(m => m.stage === 'league' && m.result).length;
  const nextMatch = state.matches.find(m => m.stage === 'league' && !m.result);
  const recentMatches = state.matches.filter(m => m.result).slice(-3).reverse();
  const pct = totalMatches ? Math.round(playedMatches / totalMatches * 100) : 0;

  const orangeCap = batters[0], orangeRunner = batters[1];
  const purpleCap = bowlers[0], purpleRunner = bowlers[1];
  const leader = standings[0];
  const hasMatches = playedMatches > 0;

  // Round progress
  const rounds = {};
  state.matches.filter(m => m.stage === 'league').forEach(m => {
    const k = m.round || 0;
    if (!rounds[k]) rounds[k] = { total: 0, done: 0 };
    rounds[k].total++;
    if (m.result) rounds[k].done++;
  });
  const roundKeys = Object.keys(rounds).sort((a,b)=>a-b);

  return (
    <div>
      {/* Hero row: leader + progress */}
      <div className="dash-grid">
        <div className="hero">
          <div className="hero-eyebrow">League Leader</div>
          {hasMatches && leader ? (
            <>
              <div className="hero-leader">
                <div className="hero-crest" style={{background: TEAM_COLORS[leader.name]}}>
                  {TEAM_SHORT[leader.name]}
                </div>
                <div>
                  <div className="hero-leader-name">{leader.name}</div>
                  <div className="hero-leader-sub">
                    {leader.W}W · {leader.L}L{leader.NR ? ` · ${leader.NR}NR` : ''} ·
                    led by {leader.owner || '—'}
                  </div>
                </div>
              </div>
              <div className="hero-metrics">
                <div className="hero-metric">
                  <div className="m-value">{leader.Pts}</div>
                  <div className="m-label">Points</div>
                </div>
                <div className="hero-metric">
                  <div className="m-value">{leader.P}</div>
                  <div className="m-label">Played</div>
                </div>
                <div className="hero-metric">
                  <div className="m-value" style={{color: leader.NRR>=0?'var(--green)':'var(--red)'}}>
                    {fmtNRR(leader.NRR)}
                  </div>
                  <div className="m-label">Net RR</div>
                </div>
                <div className="hero-metric">
                  <div className="m-value">
                    {leader.form.slice(-3).map((f,i)=>(
                      <span key={i} style={{
                        color: f==='W'?'var(--green)':f==='L'?'var(--red)':'var(--dim)'
                      }}>{f}</span>
                    )) }
                    {leader.form.length===0 && '–'}
                  </div>
                  <div className="m-label">Form</div>
                </div>
              </div>
            </>
          ) : (
            <div style={{padding:'20px 0', color:'var(--muted)', fontSize:14}}>
              No matches played yet. Record your first result to see the league leader here.
            </div>
          )}
        </div>

        <div className="progress-card">
          <div className="hero-eyebrow">Season Progress</div>
          <div className="progress-ring-wrap">
            <div className="progress-num">{playedMatches}<span>/{totalMatches}</span></div>
            <div style={{flex:1}}>
              <div style={{fontSize:12, color:'var(--muted)', fontWeight:600}}>
                {pct}% of league stage complete
              </div>
              <div className="progress-bar-track">
                <div className="progress-bar-fill" style={{width: pct+'%'}}></div>
              </div>
            </div>
          </div>
          <div className="stage-pills">
            {roundKeys.slice(0,6).map(rk => (
              <div className="stage-pill" key={rk}>
                <div className="sp-num">{rounds[rk].done}/{rounds[rk].total}</div>
                <div className="sp-label">Round {rk}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Caps row */}
      <div className="cap-grid" style={{marginBottom:20}}>
        <div className="cap-card orange">
          <div className="cap-head">
            <span className="cap-dot orange"></span> Orange Cap · Most Runs
          </div>
          {orangeCap ? (
            <>
              <div className="cap-name">{orangeCap.name}</div>
              <div className="cap-stat">{orangeCap.runs}<span> runs</span></div>
              <div className="cap-meta">
                {TEAM_SHORT[orangeCap.team] || orangeCap.team} · {orangeCap.innings} inn ·
                SR {orangeCap.SR} · HS {orangeCap.hs}
              </div>
              {orangeRunner && (
                <div className="cap-runnerup">
                  <span>2nd: <b>{orangeRunner.name}</b></span>
                  <span className="num">{orangeRunner.runs}</span>
                </div>
              )}
            </>
          ) : (
            <div style={{color:'var(--dim)', fontSize:13, padding:'10px 0'}}>
              No batting data yet
            </div>
          )}
        </div>

        <div className="cap-card purple">
          <div className="cap-head">
            <span className="cap-dot purple"></span> Purple Cap · Most Wickets
          </div>
          {purpleCap ? (
            <>
              <div className="cap-name">{purpleCap.name}</div>
              <div className="cap-stat">{purpleCap.wickets}<span> wickets</span></div>
              <div className="cap-meta">
                {TEAM_SHORT[purpleCap.team] || purpleCap.team} · {purpleCap.innings} inn ·
                Econ {purpleCap.economy} · Best {purpleCap.best}
              </div>
              {purpleRunner && (
                <div className="cap-runnerup">
                  <span>2nd: <b>{purpleRunner.name}</b></span>
                  <span className="num">{purpleRunner.wickets}</span>
                </div>
              )}
            </>
          ) : (
            <div style={{color:'var(--dim)', fontSize:13, padding:'10px 0'}}>
              No bowling data yet
            </div>
          )}
        </div>
      </div>

      {/* Standings */}
      <div className="card">
        <h2>Standings</h2>
        <StandingsTable standings={standings} />
      </div>

      {/* Next + Recent */}
      <div className="dash-grid">
        <div>
          <h3 className="section-title">Recent Results
            <span className="st-count">{recentMatches.length}</span>
          </h3>
          {recentMatches.length === 0 ? (
            <div className="card" style={{textAlign:'center', color:'var(--muted)', fontSize:13}}>
              No results recorded yet.
            </div>
          ) : (
            <div style={{display:'flex', flexDirection:'column', gap:12}}>
              {recentMatches.map(m => <MatchCard key={m.id} match={m} onClick={() => onOpenMatch(m)} />)}
            </div>
          )}
        </div>
        <div>
          <h3 className="section-title">Up Next</h3>
          {nextMatch ? (
            <MatchCard match={nextMatch} onClick={() => onOpenMatch(nextMatch)} />
          ) : (
            <div className="card" style={{textAlign:'center', color:'var(--muted)', fontSize:13}}>
              {playedMatches === totalMatches
                ? 'League stage complete — head to Playoffs.'
                : 'No upcoming match.'}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

            <th>Team</th>
            <th className="center">P</th>

              </td>

                <div className="team-cell">
                  <span className="team-dot" style={{background: TEAM_COLORS[s.name]}}></span>

                </div>
              </td>

                {s.P > 0 ? fmtNRR(s.NRR) : '—'}
              </td>
              {!compact && (
                <td className="center">
                  <span className="form-cell">
                    {s.form.slice(-5).map((f, idx) => (
                      <span key={idx} className={`form-pill form-${f}`}>{f}</span>
                    ))}
                    {s.form.length === 0 && <span style={{color:'var(--dim)',fontSize:11}}>—</span>}
                  </span>
                </td>
              )}
              <td className="right pts">{s.Pts}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ============================================================================
// FIXTURES
// ============================================================================
function Fixtures({ state, onOpenMatch }) {
  const [filter, setFilter] = useState('all');
  const [teamFilter, setTeamFilter] = useState('all');
  const [grouped, setGrouped] = useState(true);

  let matches = state.matches.filter(m => m.stage === 'league');
  if (filter === 'played') matches = matches.filter(m => m.result);
  if (filter === 'upcoming') matches = matches.filter(m => !m.result);
  if (teamFilter !== 'all') matches = matches.filter(m => m.home === teamFilter || m.away === teamFilter);

  // Group matches by round
  const byRound = {};
  matches.forEach(m => {
    const k = m.round || 0;
    if (!byRound[k]) byRound[k] = [];
    byRound[k].push(m);
  });
  const rounds = Object.keys(byRound).sort((a,b) => Number(a) - Number(b));

  const showGrouped = grouped && teamFilter === 'all';

  return (
    <div>
      <div className="filter-bar">
        <select value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">All matches</option>
          <option value="upcoming">Upcoming only</option>
          <option value="played">Played only</option>
        </select>
        <select value={teamFilter} onChange={e=>setTeamFilter(e.target.value)}>
          <option value="all">All teams</option>
          {state.teams.map(t => <option key={t.name} value={t.name}>{t.name}</option>)}
        </select>
        <button className={`btn small ${grouped ? '' : 'ghost'}`}
                onClick={() => setGrouped(g => !g)}
                disabled={teamFilter !== 'all'}>
          {grouped ? '✓ Grouped by Round' : 'Group by Round'}
        </button>
        <div className="spacer"></div>
        <div style={{alignSelf:'center', fontSize: 12, color: 'var(--muted)'}}>
          {matches.length} matches
        </div>
      </div>

      {matches.length === 0 ? (
        <div className="empty">
          <div className="icon">🏏</div>
          <div className="text">No matches match these filters</div>
        </div>
      ) : showGrouped ? (
        rounds.map(rk => (
          <div key={rk} style={{marginBottom: 28}}>
            <div style={{
              display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14,
              paddingBottom: 10, borderBottom: '1px solid var(--border)'
            }}>
              <div style={{
                fontFamily: "'Playfair Display', serif", fontWeight: 800,
                fontSize: 22, color: 'var(--accent)'
              }}>Round {rk}</div>
              <div style={{
                fontSize: 11, color: 'var(--muted)', letterSpacing: 2,
                textTransform: 'uppercase', fontWeight: 600
              }}>{byRound[rk].length} fixtures · every team plays</div>
            </div>
            <div className="match-grid">
              {byRound[rk].map(m => <MatchCard key={m.id} match={m} onClick={() => onOpenMatch(m)} />)}
            </div>
          </div>
        ))
      ) : (
        <div className="match-grid">
          {matches.map(m => <MatchCard key={m.id} match={m} onClick={() => onOpenMatch(m)} />)}
        </div>
      )}
    </div>
  );
}

function MatchCard({ match, onClick }) {
  const r = match.result;
  const played = !!r;
  return (
    <div className={`match-card ${played ? 'played' : 'upcoming'}`} onClick={onClick}>
      <div className="match-num">{match.id}{match.round ? ` · Round ${match.round}` : ''}{match.label ? ` · ${match.label}` : ''}</div>
      <div>
        <div className={`match-team-row ${r && r.winner === match.home ? 'winner' : ''}`}>
          <div className="match-team-name">
            <span className="team-dot" style={{background: TEAM_COLORS[match.home], width: 4, height: 20}}></span>
            {match.home || <span style={{color:'var(--dim)'}}>TBD</span>}
          </div>
          {played && (() => {
            const s = scoreFor(r, match.home) || scoreBySlot(r, 'home');
            return <div className="match-team-score">{fmtScore(s)} <span style={{color:'var(--muted)',fontSize:11}}>({s && s.overs ? s.overs : '–'})</span></div>;
          })()}
        </div>
        <div className="match-vs">VS</div>
        <div className={`match-team-row ${r && r.winner === match.away ? 'winner' : ''}`}>
          <div className="match-team-name">
            <span className="team-dot" style={{background: TEAM_COLORS[match.away], width: 4, height: 20}}></span>
            {match.away || <span style={{color:'var(--dim)'}}>TBD</span>}
          </div>
          {played && (() => {
            const s = scoreFor(r, match.away) || scoreBySlot(r, 'away');
            return <div className="match-team-score">{fmtScore(s)} <span style={{color:'var(--muted)',fontSize:11}}>({s && s.overs ? s.overs : '–'})</span></div>;
          })()}
        </div>
      </div>
      {played && r.margin && (
        <div className="match-result">{r.margin}</div>
      )}
      {match.venue && (
        <div className="stadium-badge" style={{marginTop: 10}}>{match.venue}</div>
      )}
      {played && r.date && (
        <div className="match-date">{r.date}</div>
      )}
      {match.desc && !played && (
        <div className="match-result" style={{color:'var(--dim)'}}>{match.desc}</div>
      )}
    </div>
  );
}

function Playoffs({ state, onOpenMatch }) {
  const seeds = useMemo(() => computePlayoffSeeds(state), [state]);
  const q1 = state.matches.find(m => m.id === 'Q1');
  const el = state.matches.find(m => m.id === 'EL');
  const q2 = state.matches.find(m => m.id === 'Q2');
  const fi = state.matches.find(m => m.id === 'FI');

  if (!seeds) {
    return (
      <div className="card">
        <h2>Playoffs</h2>
        <div className="empty">
          <div className="icon">🏆</div>
          <div className="text">Playoff bracket unlocks once all 12 league matches are complete.</div>
        </div>
      </div>
    );
  }

  return (
    <div>
      {fi && fi.result && fi.result.winner && (
        <div className="trophy-card" style={{marginBottom: 20}}>
          <div className="trophy">🏆</div>
          <div className="champ-label">Champions</div>
          <div className="champ-name">{fi.result.winner}</div>
        </div>
      )}

      <div className="card">
        <h2>Playoff Bracket</h2>
        <div className="bracket">
          <div className="bracket-col">
            <h3>Qualifier 1 / Eliminator</h3>
            <BracketMatch match={q1} onClick={() => onOpenMatch(q1)} />
            <BracketMatch match={el} onClick={() => onOpenMatch(el)} />
          </div>
          <div className="bracket-col">
            <h3>Qualifier 2</h3>
            <BracketMatch match={q2} onClick={() => q2.home && q2.away && onOpenMatch(q2)} />
          </div>
          <div className="bracket-col">
            <h3>Final</h3>
            <BracketMatch match={fi} onClick={() => fi.home && fi.away && onOpenMatch(fi)} />
          </div>
        </div>
      </div>
    </div>
  );
}

function BracketMatch({ match, onClick }) {
  if (!match) return null;
  const r = match.result;
  return (
    <div className="bracket-match" onClick={onClick}>
      <div className="bracket-label">{match.label || match.id}</div>
      <div className={`bracket-team ${r && r.winner === match.home ? 'winner' : ''}`}>
        <span>{match.home || 'TBD'}</span>
        <span className="num">{r ? fmtScore(scoreFor(r, match.home) || scoreBySlot(r,'home')) : ''}</span>
      </div>
      <div className={`bracket-team ${r && r.winner === match.away ? 'winner' : ''}`}>
        <span>{match.away || 'TBD'}</span>
        <span className="num">{r ? fmtScore(scoreFor(r, match.away) || scoreBySlot(r,'away')) : ''}</span>
      </div>
      {match.venue && <div className="stadium-badge" style={{marginTop: 8, fontSize: 10}}>{match.venue}</div>}

  );
}

function Squads({ state, onUpdateStadium }) {

  const [editingStadium, setEditingStadium] = useState(false);
  const [stadiumDraft, setStadiumDraft] = useState('');
  const team = state.teams.find(t => t.name === selected);
  const totalSpend = team.players.reduce((s,p) => s + p.price, 0);
  const overseasCount = team.players.filter(p => p.overseas).length;

  // Role breakdown
  const roles = {};
  team.players.forEach(p => { roles[p.role] = (roles[p.role] || 0) + 1; });

  function startEdit() {
    setStadiumDraft(team.homeStadium || '');
    setEditingStadium(true);
  }
  function saveEdit() {
    onUpdateStadium(team.name, stadiumDraft.trim());
    setEditingStadium(false);
  }

  return (
    <div>
      <div className="filter-bar">
        {state.teams.map(t => (
          <button key={t.name}

            style={{
              background: t.name === selected ? TEAM_COLORS[t.name] : 'transparent',
              color: t.name === selected ? '#fff' : 'var(--muted)',
              borderColor: TEAM_COLORS[t.name]
            }}>
            {t.name}
          </button>
        ))}
      </div>

      <div className="card">
        <h2>
          <span className="team-dot" style={{background: TEAM_COLORS[team.name], width: 8, height: 28}}></span>
          {team.name}
        </h2>

        {/* Home Stadium — editable */}
        <div style={{
          background: 'var(--bg-3)', border: '1px solid var(--border)',
          borderRadius: 12, padding: 18, marginBottom: 20,
          display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap'
        }}>
          <div style={{flex: '1 1 200px'}}>
            <div style={{
              fontSize: 9, color: 'var(--muted)', letterSpacing: 2.5,
              textTransform: 'uppercase', fontWeight: 700, marginBottom: 6
            }}>Home Ground</div>
            {editingStadium ? (
              <div style={{display:'flex', gap: 8}}>
                <input type="text" value={stadiumDraft}
                       onChange={e => setStadiumDraft(e.target.value)}
                       onKeyDown={e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') setEditingStadium(false); }}
                       autoFocus
                       placeholder="Stadium name"/>
              </div>
            ) : (
              <div style={{
                fontFamily: "'Playfair Display', serif", fontStyle: 'italic',
                fontWeight: 700, fontSize: 22, color: 'var(--text)'
              }}>
                📍 {team.homeStadium || <span style={{color:'var(--dim)'}}>Not set</span>}

              <>
                <button className="btn small" onClick={saveEdit}>Save</button>

              </>

              <button className="btn ghost small" onClick={startEdit}>✏️ Edit</button>

        <div className="stat-grid">
          <div className="stat-card">
            <div className="label">Owner</div>
            <div className="value" style={{fontSize: 26}}>{team.owner}</div>
          </div>
          <div className="stat-card">
            <div className="label">Squad Size</div>
            <div className="value">{team.players.length}</div>
          </div>
          <div className="stat-card">
            <div className="label">Total Spend</div>
            <div className="value" style={{fontSize: 26}}>₹{(totalSpend/100).toFixed(1)}<span style={{fontSize:14,color:'var(--muted)'}}> Cr</span></div>
          </div>
          <div className="stat-card">
            <div className="label">Overseas</div>
            <div className="value">{overseasCount}</div>
          </div>
        </div>

        <h3>Squad</h3>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Player</th>
                <th>Role</th>

                <th className="center">Capped</th>

          </table>

    </div>

    </div>
  );
}

            <strong style={{color: 'var(--text)'}}>This cannot be undone.</strong>

            background: 'var(--bg-3)', borderRadius: 10, padding: 14, marginBottom: 18,

        <div className="field">
          <label style={{color: 'var(--red)'}}>
            Type <strong style={{color: 'var(--text)', letterSpacing: 2}}>{phrase}</strong> to confirm
          </label>
          <input
            type="text"
            value={typed}
            onChange={e => setTyped(e.target.value)}
            placeholder={phrase}
            autoFocus
            style={{
              fontFamily: "'JetBrains Mono', monospace",
              letterSpacing: 2,
              borderColor: canConfirm ? 'var(--red)' : 'var(--border-2)'
            }}
          />
        </div>

        <div className="btn-row" style={{justifyContent: 'flex-end', marginTop: 20}}>
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button
            className="btn danger"
            disabled={!canConfirm}
            onClick={onConfirm}
          >
            🗑 Restart League
          </button>
        </div>
      </div>
    </div>
  );
}
